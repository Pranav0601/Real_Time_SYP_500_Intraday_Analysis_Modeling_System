<!DOCTYPE html>
<html>
<head>
    <title>SPY Dashboard</title>

    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="header">
    SPY Intraday Low Predictor Dashboard
</div>

<div class="main">

    <!-- LEFT -->
    <div class="left">
        <div class="card"><div class="label">Timestamp</div><div id="timestamp" class="value">-</div></div>
        <div class="card"><div class="label">Low So Far</div><div id="low" class="value">-</div></div>
        <div class="card"><div class="label">Probability</div><div id="prob" class="value">-</div></div>
        <div class="card"><div class="label">Signal</div><div id="signal" class="value">-</div></div>
        <div class="card"><div class="label">System Status</div><div id="status" class="value">-</div></div>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="card chart-container">
            <div class="label">Model Behavior</div>
            <canvas id="modelChart"></canvas>
        </div>

        <div class="card chart-container">
            <div class="label">SPY Market Chart</div>
            <canvas id="marketChart"></canvas>
        </div>
    </div>

</div>

<script src="js/api.js"></script>
<script src="js/charts.js"></script>
<script src="js/main.js"></script>

</body>
</html>
